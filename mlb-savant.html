<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franks_MGMT_Project | MLB Savant</title>
    <link rel="icon" type="image/jpeg" href="frankkrotoicon.jpg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --xav-blue: #0C2340; --accent: #0C2340; --success: #10b981; --bg-color: #f1f5f9; --border-color: #e2e8f0;
            --text-main: #0f172a; --text-muted: #64748b; --card-bg: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-top: 85px; }

        /* NAVIGATION */
        nav { position: fixed; top: 0; width: 100%; height: 85px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 0 5%; display: flex; justify-content: space-between; align-items: center; z-index: 4000; }
        .nav-brand { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 2rem; color: var(--xav-blue); cursor: pointer; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }

        .btn-nav { 
            padding: 0.7rem 1.4rem; border: 2px solid var(--border-color); background: transparent; 
            border-radius: 30px; color: var(--text-main); font-weight: 800; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1.2px; text-decoration: none;
        }
        .btn-nav:hover { border-color: var(--accent); transform: translateY(-2px); }
        .btn-nav.active { background: var(--accent); color: white; border-color: var(--accent); }

        .chip-vault { background: #fff; border: 3px solid #fbbf24; padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 900; color: #92400e; display: flex; align-items: center; gap: 0.8rem; font-size: 1.1rem; }

        main { max-width: 1500px; margin: 0 auto; padding: 5rem 3%; }
        .executive-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 40px; padding: 4rem; margin-bottom: 5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.04); }

        /* TRADING CARDS (TOPPS STYLE) */
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 3.5rem; }
        .player-card { height: 500px; width: 357px; perspective: 1500px; cursor: pointer; margin: 0 auto; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; border-radius: 15px; }
        .player-card.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 15px; border: 8px solid #fff; box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; overflow: hidden; background: #fff;
        }
        .card-face::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(0,0,0,0.1) 100%); pointer-events: none; }
        
        .card-img-box { height: 360px; background: #f1f5f9; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; position: relative; }
        .player-img { width: 100%; height: 110%; object-fit: contain; transform: translateY(5%); transition: 0.4s; }
        .player-card:hover .player-img { transform: translateY(0) scale(1.05); }
        
        .card-info { padding: 1rem; background: var(--accent); color: #fff; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-info h4 { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
        .card-info p { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; opacity: 0.9; }

        .card-back { transform: rotateY(180deg); padding: 2.5rem; border-color: var(--accent); display: flex; flex-direction: column; background: #fff; }
        .card-back h3 { font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 2rem; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 1rem; }
        .stat-line { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid #eee; font-weight: 900; font-size: 1rem; color: #1a202c; }
        .stat-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* TACTICAL FIELD */
        .field-frame { position: relative; width: 100%; max-width: 1000px; height: 750px; margin: 4rem auto; background: #0f172a; border-radius: 60px; border: 12px solid #1e293b; overflow: hidden; box-shadow: inset 0 0 150px rgba(0,0,0,0.9); }
        .field-node { position: absolute; width: 120px; text-align: center; transform: translate(-50%, -50%); transition: 0.7s; z-index: 10; }
        .node-tag { font-size: 0.8rem; font-weight: 900; background: var(--success); color: #000; padding: 3px 12px; border-radius: 12px; display: inline-block; }
        .node-name { font-size: 0.9rem; font-weight: 700; color: #fff; margin-top: 6px; text-shadow: 0 3px 6px rgba(0,0,0,1); }

        .team-select-box { text-align: center; padding: 8rem 2rem; border: 4px dashed var(--border-color); border-radius: 40px; }
        .hidden { display: none !important; }

        select { padding: 1.2rem 3rem; border-radius: 50px; border: 4px solid var(--accent); background: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; outline: none; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand" onclick="window.location.href='index.html'">Franks<span>_MGMT</span></div>
        <div class="nav-links">
            <a href="index.html" class="btn-nav">Home</a>
            <a href="casino.html" class="btn-nav">Casino</a>
            <a href="mlb-savant.html" class="btn-nav active">Baseball cards</a>
            <a href="betting-hub.html" class="btn-nav">Betting Hub</a>
            <div class="chip-vault"><i class="fas fa-gem"></i> <span id="masterChips">100</span></div>
        </div>
    </nav>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5rem;">
            <div>
                <h2 style="font-family:'Playfair Display'; font-size: 3.5rem; font-weight: 900; text-transform: uppercase;">MLB Savant Hub</h2>
                <p style="color:var(--text-muted); font-weight: 800; letter-spacing: 2px;">AUTHENTIC TRADING CARDS • TACTICAL FIELD MAPPING</p>
            </div>
            <select id="teamSelector" onchange="syncSavantTeam(this.value)">
                <option value="HOME">Select MLB Team</option>
            </select>
        </div>

        <div id="initialState" class="team-select-box">
            <i class="fas fa-baseball-ball" style="font-size: 5rem; color: var(--border-color); margin-bottom: 2rem;"></i>
            <h2 style="color: var(--text-muted);">Please select an MLB Franchise to load tactical data.</h2>
        </div>

        <div id="savantContent" class="hidden">
            <div class="executive-card" style="padding: 2.5rem; text-align: center;">
                <h2 id="teamHeaderTitle" style="font-size: 4rem; font-family: 'Playfair Display'; color: var(--accent);">TEAM NAME</h2>
                <p id="teamInning" style="font-weight: 900; letter-spacing: 3px; color: var(--success); margin-top: 1rem;"></p>
            </div>

            <div class="executive-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 3rem;"><i class="fas fa-crosshairs"></i> Live Positioning</h3>
                <div class="field-frame" id="savantField">
                    <svg viewBox="0 0 100 100" style="width:100%; height:100%; opacity:0.15;"><path d="M50 90 L10 50 L50 10 L90 50 Z" fill="none" stroke="#fff" stroke-width="0.3"></path></svg>
                </div>
            </div>

            <h3 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 3rem; text-transform: uppercase; border-left: 10px solid var(--accent); padding-left: 2rem;">Active Roster Card Stack</h3>
            <div id="savantRoster" class="roster-grid"></div>
        </div>
    </main>

    <script>
        const STATE = {
            teamIds: { "CLE":114, "LAD":119, "NYY":147, "PHI":143, "ATL":144, "HOU":117, "BAL":110, "BOS":111, "TB":139, "TOR":141, "CWS":145, "DET":116, "KC":118, "MIN":142, "LAA":108, "SEA":136, "TEX":140, "MIA":146, "NYM":121, "WSH":120, "CHC":112, "CIN":113, "MIL":158, "PIT":134, "STL":138, "AZ":109, "COL":115, "SD":135, "SF":137, "OAK":133 },
            teamColors: { "CLE":"#E31937", "LAD":"#005A9C", "NYY":"#003087", "PHI":"#E81828", "ATL":"#CE1141", "HOU":"#EB6E1F", "BAL":"#DF4601", "BOS":"#BD3039", "TB":"#092C5C", "TOR":"#134A8E", "CWS":"#27251F", "DET":"#0C2340", "KC":"#004687", "MIN":"#002B5C", "LAA":"#BA0021", "SEA":"#005C5C", "TEX":"#003278", "MIA":"#00A3E0", "NYM":"#FF5910", "WSH":"#AB0003", "CHC":"#0E3386", "CIN":"#C6011F", "MIL":"#12284B", "PIT":"#FFB81C", "STL":"#C41E3A", "AZ":"#A71930", "COL":"#333366", "SD":"#2F241D", "SF":"#FD5A1E", "OAK":"#003831" }
        };

        function populateTeamList() {
            const sel = document.getElementById('teamSelector');
            Object.keys(STATE.teamIds).sort().forEach(abbr => {
                const opt = document.createElement('option');
                opt.value = abbr; opt.innerText = abbr;
                sel.appendChild(opt);
            });
        }

        async function syncSavantTeam(abbr) {
            if(abbr === "HOME") {
                document.getElementById('initialState').classList.remove('hidden');
                document.getElementById('savantContent').classList.add('hidden');
                return;
            }
            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('savantContent').classList.remove('hidden');
            
            const id = STATE.teamIds[abbr], color = STATE.teamColors[abbr];
            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('teamHeaderTitle').innerText = abbr + " STRATEGIC FEED";
            
            const gRes = await fetch(`https://statsapi.mlb.com/api/v1/schedule/games/?sportId=1&teamId=${id}&hydrate=linescore`);
            const gData = await gRes.json(); const game = gData.dates[0]?.games.find(gm => gm.teams.away.team.id === id || gm.teams.home.team.id === id);
            document.getElementById('teamInning').innerText = game ? `STATUS: ${game.status.detailedState.toUpperCase()} | ${game.linescore?.inningState || ''} ${game.linescore?.currentInningOrdinal || ''}` : "NO GAME SCHEDULED FOR TODAY";

            const rRes = await fetch(`https://statsapi.mlb.com/api/v1/teams/${id}/roster`);
            const rData = await rRes.json();
            renderBaseballCards(rData.roster);
            renderFieldNodes(rData.roster);
        }

        async function renderBaseballCards(ros) {
            const grid = document.getElementById('savantRoster'); grid.innerHTML = '';
            for(let p of ros.slice(0, 24)) {
                const card = document.createElement('div'); card.className = 'baseball-card';
                card.onclick = async () => {
                    if(!card.classList.contains('flipped')) {
                        const stats = await fetchStats(p.person.id, p.position.code === '1');
                        document.getElementById(`stats-${p.person.id}`).innerHTML = stats;
                    }
                    card.classList.toggle('flipped');
                };
                const img = `https://img.mlbstatic.com/mlb-photos/image/upload/d_player_profile_default_image.png/w_426,q_auto:best/v1/people/${p.person.id}/headshot/67/current`;
                card.innerHTML = `<div class="card-inner"><div class="card-face card-front"><div class="card-img-box"><img src="${img}" class="player-img"></div><div class="card-info"><h4>${p.person.fullName}</h4><p>${p.position.name}</p></div></div><div class="card-back card-face"><h3>${p.person.fullName}</h3><div id="stats-${p.person.id}" style="width:100%;">Fetching Stats...</div><p style="font-size:0.7rem; opacity:0.4; margin-top:auto; text-align:center;">PROVABLE LIVE SEASON DATA</p></div></div>`;
                grid.appendChild(card);
            }
        }

        async function fetchStats(pid, isP) {
            try {
                const res = await fetch(`https://statsapi.mlb.com/api/v1/people/${pid}/stats?stats=season&group=${isP?'pitching':'hitting'}`);
                const d = await res.json(); const s = d.stats[0]?.splits[0]?.stat;
                if(!s) return "Season data pending.";
                return isP ? 
                    `<div class="stat-row"><span class="stat-label">ERA</span><span>${s.era}</span></div><div class="stat-row"><span class="stat-label">WHIP</span><span>${s.whip}</span></div><div class="stat-row"><span class="stat-label">SO</span><span>${s.strikeOuts}</span></div><div class="stat-row"><span class="stat-label">W/L</span><span>${s.wins}-${s.losses}</span></div><div class="stat-row"><span class="stat-label">IP</span><span>${s.inningsPitched}</span></div>` :
                    `<div class="stat-row"><span class="stat-label">AVG</span><span>${s.avg}</span></div><div class="stat-row"><span class="stat-label">OPS</span><span>${s.ops}</span></div><div class="stat-row"><span class="stat-label">HR</span><span>${s.homeRuns}</span></div><div class="stat-row"><span class="stat-label">RBI</span><span>${s.rbi}</span></div><div class="stat-row"><span class="stat-label">OBP</span><span>${s.obp}</span></div>`;
            } catch(e) { return "Sync Error."; }
        }

        function renderFieldNodes(ros) {
            const arena = document.getElementById('savantField'); document.querySelectorAll('.field-node').forEach(n => n.remove());
            const pos = { 'P':[50,55], 'C':[50,88], '1B':[78,50], '2B':[68,32], '3B':[22,50], 'SS':[32,32], 'LF':[15,22], 'CF':[50,8], 'RF':[85,22] };
            Object.keys(pos).forEach(key => {
                const p = ros.find(player => player.position.abbreviation === key) || { person: { fullName: 'TBD' } };
                const div = document.createElement('div'); div.className = 'field-node'; div.style.left = pos[key][0]+'%'; div.style.top = pos[key][1]+'%';
                div.innerHTML = `<div class="node-label">${key}</div><div class="node-name">${p.person.fullName}</div>`;
                arena.appendChild(div);
            });
        }

        window.onload = () => {
            populateTeamList();
            const saved = localStorage.getItem('franks_chips_v94');
            document.getElementById('masterChips').innerText = saved || '100';
        };
    </script>
</body>
</html>
